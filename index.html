<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>5 Nights with Brian</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family:'Courier New', monospace; height:100vh; color:#aaffaa; }
    .crt {
        position:relative; width:100vw; height:100vh; background:#000;
        border:40px solid #111; box-shadow:inset 0 0 200px #000; overflow:hidden;
    }
    canvas#noise, .scanlines {
        position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:30;
    }
    .scanlines {
        background:repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(255,255,255,0.08) 2px, rgba(255,255,255,0.08) 4px);
        animation:scan 4s linear infinite;
    }
    @keyframes scan { 0%{transform:translateY(-100%)} 100%{transform:translateY(100%)} }

    .portrait {
        position:absolute; right:0; top:50%; transform:translateY(-50%);
        width:58%; height:100%; object-fit:cover; z-index:1;
        filter:contrast(1.2) brightness(0.85); background:#000;
    }

    .content, #game-screen { position:relative; z-index:10; }
    .title { font-size:4.2rem; letter-spacing:10px; text-transform:uppercase; text-shadow:0 0 20px #aaffaa; margin-bottom:40px; }
    .menu-item { font-size:2.1rem; line-height:2.6rem; padding:8px 0; cursor:pointer; transition:0.2s; }
    .menu-item:hover { color:#ff6666; text-shadow:0 0 15px #ff4444; }

    #game-screen {
        display:none; flex-direction:column; justify-content:center; align-items:center;
        height:100%; background:rgba(0,0,0,0.92);
    }
    #game-canvas { image-rendering:pixelated; border:6px solid #222; box-shadow:0 0 40px #000; background:#111; }
    #game-info { margin-top:12px; font-size:1.8rem; }

    .game-over-screen {
        position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95);
        display:none; flex-direction:column; justify-content:center; align-items:center; z-index:50; color:#ff4444;
    }
    .back-btn {
        margin-top:40px; padding:12px 30px; font-size:1.8rem;
        background:#111; border:3px solid #aaffaa; color:#aaffaa; cursor:pointer;
    }
    .back-btn:hover { background:#aaffaa; color:#000; }
</style>
</head>
<body>
<div class="crt">
    <canvas id="noise"></canvas>
    <img id="portrait" src="baseroom-normal.jpg" class="portrait" alt="">

    <div class="content" id="menu-screen">
        <div class="title">5 NIGHTS WITH BRIAN</div>
        <div class="menu">
            <div class="menu-item" id="new-game">>> NEW GAME</div>
            <div class="menu-item" id="continue">>> CONTINUE</div>
        </div>
        <div class="static-text">NIGHT 1</div>
    </div>

    <div id="game-screen">
        <canvas id="game-canvas" width="800" height="400"></canvas>
        <div id="game-info">LEVEL <span id="level">1</span> | TIME: <span id="timer">45</span>s</div>
    </div>

    <div class="game-over-screen" id="game-over-screen">
        <img id="screamer" src="baseroom-creepy.jpg" style="width:100%; height:100%; object-fit:cover; display:none;">
        <div style="font-size:6rem; margin-bottom:30px;" id="end-text">GAME OVER</div>
        <div class="back-btn" id="back-btn">BACK TO MENU</div>
    </div>

    <div class="scanlines"></div>
</div>

<script>
// CRT Noise
const noiseCanvas = document.getElementById('noise');
const nCtx = noiseCanvas.getContext('2d');
function resizeNoise(){ noiseCanvas.width = window.innerWidth; noiseCanvas.height = window.innerHeight; }
resizeNoise(); window.addEventListener('resize', resizeNoise);
function drawNoise(){
    const data = nCtx.createImageData(noiseCanvas.width, noiseCanvas.height);
    const buf = data.data;
    for(let i=0;i<buf.length;i+=4){ const val=Math.random()*255; buf[i]=buf[i+1]=buf[i+2]=val; buf[i+3]=65; }
    nCtx.putImageData(data,0,0); requestAnimationFrame(drawNoise);
}
drawNoise();

// Скример в меню
const portrait = document.getElementById('portrait');
setInterval(() => {
    if (document.getElementById('menu-screen').style.display !== 'none') {
        portrait.src = 'baseroom-creepy.jpg';
        setTimeout(() => portrait.src = 'baseroom-normal.jpg', 380);
    }
}, 7200);

// ====================== ИГРА ======================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const levelEl = document.getElementById('level');
const timerEl = document.getElementById('timer');

let gameActive = false, currentLevel = 1, timeLeft = 45;
let timerInterval, obstacles = [], candles = [], pacmans = [];

const player = { x: 120, y: 280, width: 48, height: 72, vy: 0, jumping: false, ducking: false };

let keys = {};

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function drawGround() {
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 340, 800, 60);
}

function drawPlayer() {
    const py = player.ducking ? player.y + 28 : player.y;
    const ph = player.ducking ? 44 : player.height;

    ctx.fillStyle = '#4488ff';
    ctx.fillRect(player.x + 10, py + 18, 30, ph - 22);
    ctx.fillStyle = '#ffddaa';
    ctx.fillRect(player.x + 18, py + 8, 24, 24);
    ctx.fillStyle = '#112233';
    ctx.fillRect(player.x + 24, py + 14, 7, 8);
}

function createCandle() {
    candles.push({ x: 750 + Math.random()*150, y: -40, width: 20, height: 50, speed: 8.5 });
}

function createPacman() {
    pacmans.push({ x: 820, y: 275, size: 38, speed: 7.5 + currentLevel*1.2, mouth: 0 });
}

function updateCandles() {
    for(let i = candles.length-1; i >= 0; i--) {
        let c = candles[i];
        c.y += c.speed;

        ctx.fillStyle = '#ff0000';
        ctx.fillRect(c.x, c.y, c.width, c.height);
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(c.x+5, c.y+8, 10, 14);

        if (c.y > 420) candles.splice(i,1);

        if (player.x + player.width > c.x && player.x < c.x + c.width &&
            player.y + player.height > c.y && player.y < c.y + c.height) {
            triggerScreamer();
        }
    }
}

function updatePacmans() {
    for(let i = pacmans.length-1; i >= 0; i--) {
        let p = pacmans[i];
        p.x -= p.speed;
        p.mouth = Math.sin(Date.now()/60) * 0.8 + 0.6; // анимация рта

        // Рисуем Pac-Man
        ctx.fillStyle = '#ffdd00';
        ctx.beginPath();
        ctx.arc(p.x + p.size/2, p.y + p.size/2, p.size/2, p.mouth*Math.PI, (2-p.mouth)*Math.PI);
        ctx.lineTo(p.x + p.size/2, p.y + p.size/2);
        ctx.fill();

        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(p.x + p.size*0.65, p.y + p.size*0.45, 5, 0, Math.PI*2);
        ctx.fill();

        if (p.x < -50) pacmans.splice(i,1);

        // Коллизия
        if (player.x + player.width > p.x && player.x < p.x + p.size &&
            player.y + player.height > p.y && player.y < p.y + p.size) {
            triggerScreamer();
        }
    }
}

function gameLoop() {
    if (!gameActive) return;

    ctx.fillStyle = '#0f0f0f';
    ctx.fillRect(0, 0, 800, 400);
    drawGround();

    // Управление
    player.ducking = (keys['ArrowDown'] || keys['KeyS']);

    if ((keys['Space'] || keys['ArrowUp']) && !player.jumping) {
        player.vy = -17.5;
        player.jumping = true;
    }

    player.vy += 0.85;
    player.y += player.vy;

    if (player.y >= 280) {
        player.y = 280;
        player.vy = 0;
        player.jumping = false;
    }

    drawPlayer();
    updateCandles();
    updatePacmans();

    requestAnimationFrame(gameLoop);
}

// Микро-скримеры
function microScreamer() {
    if (!gameActive) return;
    const s = document.getElementById('screamer');
    s.style.display = 'block';
    setTimeout(() => s.style.display = 'none', 420);
}

// Запуск игры
function startGame() {
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    document.getElementById('game-over-screen').style.display = 'none';

    gameActive = true;
    currentLevel = 1;
    timeLeft = 45;
    player.y = 280;
    obstacles = []; candles = []; pacmans = [];

    levelEl.textContent = 1;
    timerEl.textContent = timeLeft;

    timerInterval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;
        if (timeLeft <= 0) {
            currentLevel++;
            if (currentLevel > 5) winGame();
            else levelEl.textContent = currentLevel;
            timeLeft = 45;
        }
    }, 1000);

    setInterval(() => { if(gameActive) createCandle(); }, 380);        // часто
    setInterval(() => { if(gameActive) createPacman(); }, 2400);       // Pac-Man
    setInterval(microScreamer, 10200);                                 // микро-скримеры

    gameLoop();
}

function triggerScreamer() {
    gameActive = false;
    clearInterval(timerInterval);
    const goScreen = document.getElementById('game-over-screen');
    document.getElementById('screamer').style.display = 'block';
    goScreen.style.display = 'flex';
    setTimeout(() => document.getElementById('screamer').style.display = 'none', 650);
}

function winGame() {
    gameActive = false;
    clearInterval(timerInterval);
    ctx.fillStyle = '#aaffaa';
    ctx.font = 'bold 48px Courier New';
    ctx.fillText('YOU SURVIVED 5 NIGHTS!', 130, 200);
}

document.getElementById('new-game').addEventListener('click', startGame);
document.getElementById('back-btn').addEventListener('click', () => {
    document.getElementById('game-over-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('menu-screen').style.display = 'block';
});
</script>
</body>
</html>
