<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>5 Nights with Brian</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family:'Courier New', monospace; height:100vh; color:#aaffaa; }
    .crt {
        position:relative; width:100vw; height:100vh; background:#000;
        border:40px solid #111; box-shadow:inset 0 0 200px #000; overflow:hidden;
    }
    canvas#noise, .scanlines {
        position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:30;
    }
    .scanlines {
        background:repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(255,255,255,0.08) 2px, rgba(255,255,255,0.08) 4px);
        animation:scan 4s linear infinite;
    }
    @keyframes scan { 0%{transform:translateY(-100%)} 100%{transform:translateY(100%)} }

    .portrait {
        position:absolute; right:0; top:50%; transform:translateY(-50%);
        width:58%; height:100%; object-fit:cover; z-index:1;
        filter:contrast(1.2) brightness(0.85); background:#000;
    }

    .content, #game-screen { position:relative; z-index:10; }
    .title { font-size:4.2rem; letter-spacing:10px; text-transform:uppercase; text-shadow:0 0 20px #aaffaa; margin-bottom:40px; }
    .menu-item { font-size:2.1rem; line-height:2.6rem; padding:8px 0; cursor:pointer; transition:0.2s; }
    .menu-item:hover { color:#ff6666; text-shadow:0 0 15px #ff4444; }

    #game-screen {
        display:none; flex-direction:column; justify-content:center; align-items:center;
        height:100%; background:rgba(0,0,0,0.9);
    }
    #game-canvas { image-rendering:pixelated; border:6px solid #222; box-shadow:0 0 40px #000; }
    #game-info { margin-top:12px; font-size:1.7rem; }
    
    .game-over-screen {
        position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95);
        display:none; flex-direction:column; justify-content:center; align-items:center; z-index:50; color:#ff4444;
    }
    .back-btn {
        margin-top:40px; padding:12px 30px; font-size:1.8rem;
        background:#111; border:3px solid #aaffaa; color:#aaffaa; cursor:pointer;
    }
    .back-btn:hover { background:#aaffaa; color:#000; }
</style>
</head>
<body>
<div class="crt">
    <canvas id="noise"></canvas>
    <img id="portrait" src="baseroom-normal.jpg" class="portrait" alt="">

    <div class="content" id="menu-screen">
        <div class="title">5 NIGHTS WITH BRIAN</div>
        <div class="menu">
            <div class="menu-item" id="new-game">>> NEW GAME</div>
            <div class="menu-item" id="continue">>> CONTINUE</div>
        </div>
        <div class="static-text">NIGHT 1</div>
    </div>

    <div id="game-screen">
        <canvas id="game-canvas" width="800" height="450"></canvas>
        <div id="game-info">LEVEL <span id="level">1</span> — TIME: <span id="timer">40</span>s</div>
    </div>

    <div class="game-over-screen" id="game-over-screen">
        <img id="screamer" src="baseroom-creepy.jpg" style="width:100%; height:100%; object-fit:cover; display:none;">
        <div style="font-size:6rem; margin-bottom:30px;" id="end-text">GAME OVER</div>
        <div class="back-btn" id="back-btn">BACK TO MENU</div>
    </div>

    <div class="scanlines"></div>
</div>

<script>
// CRT Noise
const noiseCanvas = document.getElementById('noise');
const nCtx = noiseCanvas.getContext('2d');
function resizeNoise(){ noiseCanvas.width = window.innerWidth; noiseCanvas.height = window.innerHeight; }
resizeNoise(); window.addEventListener('resize', resizeNoise);
function drawNoise(){
    const data = nCtx.createImageData(noiseCanvas.width, noiseCanvas.height);
    const buf = data.data;
    for(let i=0;i<buf.length;i+=4){ const val=Math.random()*255; buf[i]=buf[i+1]=buf[i+2]=val; buf[i+3]=65; }
    nCtx.putImageData(data,0,0); requestAnimationFrame(drawNoise);
}
drawNoise();

// Скример в меню
const portrait = document.getElementById('portrait');
setInterval(() => {
    if (document.getElementById('menu-screen').style.display !== 'none') {
        portrait.src = 'baseroom-creepy.jpg';
        setTimeout(() => portrait.src = 'baseroom-normal.jpg', 350);
    }
}, 7200);

// ====================== МИНИ-ИГРА ======================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const levelEl = document.getElementById('level');
const timerEl = document.getElementById('timer');

let gameActive = false, currentLevel = 1, timeLeft = 40;
let timerInterval, obstacles = [], score = 0;

const player = { x: 80, y: 280, width: 42, height: 82, vy: 0, jumping: false, speed: 7 };
const enemy = { x: 780, y: 265, width: 50, height: 88, speed: 6.5 };

let keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function drawBackground() {
    ctx.fillStyle = '#0a0505'; ctx.fillRect(0,0,800,450);
    ctx.fillStyle = '#1a0f0f'; ctx.fillRect(0,130,800,320);

    ctx.strokeStyle = '#331111'; ctx.lineWidth = 6;
    for(let i=0; i<8; i++){
        let y = 130 + i*42;
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(800,y); ctx.stroke();
    }
}

function drawPlayer() {
    // Тело
    ctx.fillStyle = '#3366ff';
    ctx.fillRect(player.x+8, player.y+28, 28, 54);
    // Руки
    ctx.fillRect(player.x+4, player.y+35, 8, 22);
    ctx.fillRect(player.x+32, player.y+35, 8, 22);
    // Голова
    ctx.fillStyle = '#ffddaa';
    ctx.fillRect(player.x+12, player.y+10, 22, 24);
    // Глаза
    ctx.fillStyle = '#112244';
    ctx.fillRect(player.x+17, player.y+16, 6, 7);
    ctx.fillRect(player.x+25, player.y+16, 6, 7);
}

function drawEnemy() {
    ctx.fillStyle = '#aa2222';
    ctx.fillRect(enemy.x+6, enemy.y+22, 38, 66);
    ctx.fillStyle = '#661111';
    ctx.fillRect(enemy.x+9, enemy.y+8, 32, 26);
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(enemy.x+15, enemy.y+14, 9, 9);
    ctx.fillRect(enemy.x+27, enemy.y+14, 9, 9);
}

function createObstacle() {
    if (Math.random() < 0.6 + currentLevel*0.08) {
        obstacles.push({
            x: 780 + Math.random()*100,
            y: 80 + Math.random()*120,
            width: 22,
            height: 28,
            speed: 5 + currentLevel*1.2
        });
    }
}

function updateAndDrawObstacles() {
    for(let i = obstacles.length-1; i >= 0; i--){
        let o = obstacles[i];
        o.x -= o.speed;

        ctx.fillStyle = '#ff2222';
        ctx.fillRect(o.x, o.y, o.width, o.height);
        ctx.fillStyle = '#ffff00';
        ctx.fillRect(o.x+6, o.y+8, 10, 12); // пламя

        if (o.x < -30) obstacles.splice(i,1);

        // Коллизия с игроком
        if (
            player.x < o.x + o.width && player.x + player.width > o.x &&
            player.y < o.y + o.height && player.y + player.height > o.y
        ) {
            triggerScreamer();
        }
    }
}

function gameLoop() {
    if (!gameActive) return;

    drawBackground();
    drawPlayer();
    drawEnemy();

    // Управление
    if ((keys['ArrowLeft'] || keys['KeyA'])) player.x -= player.speed;
    if ((keys['ArrowRight'] || keys['KeyD'])) player.x += player.speed;

    // Прыжок
    if ((keys['Space'] || keys['ArrowUp']) && !player.jumping) {
        player.vy = -17;
        player.jumping = true;
    }

    player.vy += 0.85; // гравитация
    player.y += player.vy;

    if (player.y >= 280) {
        player.y = 280;
        player.vy = 0;
        player.jumping = false;
    }

    if (player.x < 20) player.x = 20;
    if (player.x > 380) player.x = 380;

    // Враг
    enemy.x -= enemy.speed + currentLevel*0.6;
    if (enemy.x < -80) enemy.x = 850;

    updateAndDrawObstacles();

    // Коллизия с врагом
    if (
        player.x + player.width - 10 > enemy.x &&
        player.x + 10 < enemy.x + enemy.width &&
        player.y + player.height > enemy.y + 15
    ) {
        triggerScreamer();
        return;
    }

    requestAnimationFrame(gameLoop);
}

function nextLevel() {
    currentLevel++;
    if (currentLevel > 5) {
        winGame();
        return;
    }
    levelEl.textContent = currentLevel;
    enemy.speed = 6.5 + currentLevel * 1.1;
    timeLeft = 38;
    timerEl.textContent = timeLeft;
    obstacles = [];
}

function startGame() {
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    document.getElementById('game-over-screen').style.display = 'none';

    gameActive = true;
    currentLevel = 1;
    timeLeft = 40;
    player.x = 80; player.y = 280;
    enemy.x = 780;
    obstacles = [];
    levelEl.textContent = 1;
    timerEl.textContent = timeLeft;

    timerInterval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;
        if (timeLeft <= 0) nextLevel();
    }, 1000);

    setInterval(() => { if(gameActive) createObstacle(); }, 480);

    gameLoop();
}

function triggerScreamer() {
    gameActive = false;
    clearInterval(timerInterval);
    const screamer = document.getElementById('screamer');
    const goScreen = document.getElementById('game-over-screen');
    screamer.style.display = 'block';
    goScreen.style.display = 'flex';
    setTimeout(() => screamer.style.display = 'none', 650);
}

function winGame() {
    gameActive = false;
    clearInterval(timerInterval);
    ctx.fillStyle = '#aaffaa';
    ctx.font = 'bold 52px Courier New';
    ctx.fillText('YOU BEAT ALL 5 NIGHTS!', 110, 200);
}

document.getElementById('new-game').addEventListener('click', startGame);
document.getElementById('back-btn').addEventListener('click', () => {
    document.getElementById('game-over-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('menu-screen').style.display = 'block';
    portrait.src = 'baseroom-normal.jpg';
});
</script>
</body>
</html>
