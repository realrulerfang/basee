<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>baseroom</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        background: #000;
        overflow: hidden;
        font-family: 'Courier New', monospace;
        height: 100vh;
        color: #0f0;
    }

    .crt {
        position: relative;
        width: 100vw;
        height: 100vh;
        border: 30px solid #0a0a0a;
        box-shadow: 0 0 80px rgba(0, 255, 70, 0.4),
                    inset 0 0 120px rgba(0,0,0,0.95);
        overflow: hidden;
    }

    .screen {
        position: relative;
        width: 100%;
        height: 100%;
        background: #050505;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    canvas#noise {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        opacity: 0.35;
        mix-blend-mode: screen;
        pointer-events: none;
    }

    .scanlines {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: repeating-linear-gradient(
            to bottom,
            transparent 0px,
            transparent 3px,
            rgba(0, 255, 80, 0.12) 3px,
            rgba(0, 255, 80, 0.12) 6px
        );
        pointer-events: none;
        animation: scan 8s linear infinite;
        z-index: 2;
    }

    @keyframes scan { 
        0% { transform: translateY(-100%); } 
        100% { transform: translateY(100%); } 
    }

    .content {
        position: relative;
        z-index: 5;
        text-align: center;
    }

    .title {
        font-size: 5.5rem;
        letter-spacing: 12px;
        text-transform: uppercase;
        color: #00ff44;
        text-shadow: 0 0 20px #00ff44,
                     0 0 40px #00aa33;
        margin-bottom: 40px;
        animation: glitch 1.5s infinite;
    }

    .portrait {
        width: 380px;
        height: 380px;
        object-fit: cover;
        border: 12px solid #112211;
        box-shadow: 0 0 40px #00ff44,
                    inset 0 0 30px #000;
        transition: all 0.2s;
        image-rendering: crisp-edges;
    }

    .menu {
        margin-top: 50px;
        font-size: 2rem;
        line-height: 2.4rem;
    }

    .menu-item {
        cursor: pointer;
        padding: 8px 40px;
        display: inline-block;
        transition: all 0.2s;
    }

    .menu-item:hover {
        background: rgba(0, 255, 70, 0.15);
        color: #ff4444;
        text-shadow: 0 0 15px #ff4444;
    }

    .static-text {
        margin-top: 60px;
        font-size: 1.1rem;
        opacity: 0.7;
        letter-spacing: 3px;
    }

    @keyframes glitch {
        0%, 100% { text-shadow: 3px 3px #ff00ff, -3px -3px #00ffff; }
        20% { text-shadow: -3px -3px #ff00ff, 3px 3px #00ffff; }
    }
</style>
</head>
<body>

<div class="crt">
    <div class="screen">
        <canvas id="noise"></canvas>
        
        <div class="content">
            <div class="title">baseroom</div>
            
            <img id="portrait" src="baseroom-normal.jpg" class="portrait" alt="">
            
            <div class="menu">
                <div class="menu-item">>> NEW GAME</div><br>
                <div class="menu-item">>> CONTINUE</div>
            </div>
            
            <div class="static-text">SYSTEM ONLINE • NIGHT 1</div>
        </div>

        <div class="scanlines"></div>
    </div>
</div>

<script>
// Canvas noise (FNAF стиль)
const canvas = document.getElementById('noise');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function drawNoise() {
    const imageData = ctx.createImageData(canvas.width, canvas.height);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
        const noise = Math.random() * 255;
        data[i] = data[i+1] = data[i+2] = noise;
        data[i+3] = 55;
    }
    ctx.putImageData(imageData, 0, 0);
    requestAnimationFrame(drawNoise);
}
drawNoise();

// Жуткая фотка каждые ~5 секунд
const portrait = document.getElementById('portrait');

setInterval(() => {
    portrait.src = 'baseroom-creepy.jpg';
    
    setTimeout(() => {
        portrait.src = 'baseroom-normal.jpg';
    }, 380 + Math.random() * 220); // держится 0.38–0.6 секунды
}, 5000); // каждые 5 секунд
</script>

</body>
</html>
