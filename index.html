<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>5 Nights with Brian</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        background: #000;
        overflow: hidden;
        font-family: 'Courier New', monospace;
        height: 100vh;
        color: #aaffaa;
    }
    .crt {
        position: relative;
        width: 100vw;
        height: 100vh;
        background: #000;
        overflow: hidden;
    }
    canvas#noise, .scanlines {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 5;
    }
    .scanlines {
        background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(255,255,255,0.07) 2px, rgba(255,255,255,0.07) 4px);
        animation: scan 4s linear infinite;
    }
    @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

    .content {
        position: absolute;
        top: 28%;
        left: 6%;   /* ещё левее */
        z-index: 10;
    }
    .title {
        font-size: 4.4rem;
        letter-spacing: 14px;
        text-transform: uppercase;
        text-shadow: 0 0 25px #aaffaa;
        margin-bottom: 70px;
        color: #aaffaa;
    }
    .menu-item {
        font-size: 2.3rem;
        line-height: 3rem;
        padding: 10px 0;
        cursor: pointer;
        transition: 0.2s;
    }
    .menu-item:hover {
        color: #ff6666;
        text-shadow: 0 0 20px #ff4444;
    }

    #game-screen {
        display: none;
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 20;
        background: #000;
    }
    .note, .night-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #111;
        border: 5px solid #aaffaa;
        padding: 50px 80px;
        font-size: 2.6rem;
        color: #ff4444;
        display: none;
        z-index: 100;
        text-align: center;
        box-shadow: 0 0 50px #ff0000;
    }
    .prompt {
        position: absolute;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 1.9rem;
        color: #aaffaa;
        text-shadow: 0 0 15px #aaffaa;
        display: none;
        z-index: 50;
    }
</style>
</head>
<body>
<div class="crt">
    <canvas id="noise"></canvas>
    <img id="portrait" src="baseroom-normal.jpg" style="position:absolute; right:0; top:50%; transform:translateY(-50%); width:58%; height:100%; object-fit:cover; z-index:1; filter:contrast(1.15) brightness(0.9);">

    <div class="content" id="menu-screen">
        <div class="title">5 NIGHTS WITH BRIAN</div>
        <div class="menu">
            <div class="menu-item" id="new-game">>> NEW GAME</div>
            <div class="menu-item" id="continue">>> CONTINUE</div>
        </div>
    </div>

    <div id="game-screen">
        <canvas id="game-canvas" width="1000" height="600"></canvas>
        <div class="prompt" id="prompt">НАЖМИ F</div>
        <div class="note" id="note"></div>
        <div class="night-text" id="night-text"></div>
    </div>

    <div class="scanlines"></div>
</div>

<script>
// CRT + Noise
const noiseCanvas = document.getElementById('noise');
const nCtx = noiseCanvas.getContext('2d');
function resizeNoise(){ noiseCanvas.width = window.innerWidth; noiseCanvas.height = window.innerHeight; }
resizeNoise(); window.addEventListener('resize', resizeNoise);
function drawNoise(){
    const data = nCtx.createImageData(noiseCanvas.width, noiseCanvas.height);
    const buf = data.data;
    for(let i=0;i<buf.length;i+=4){ const val=Math.random()*255; buf[i]=buf[i+1]=buf[i+2]=val; buf[i+3]=55; }
    nCtx.putImageData(data,0,0); requestAnimationFrame(drawNoise);
}
drawNoise();

const portrait = document.getElementById('portrait');
setInterval(() => {
    if (document.getElementById('menu-screen').style.display !== 'none') {
        portrait.src = 'baseroom-creepy.jpg';
        setTimeout(() => portrait.src = 'baseroom-normal.jpg', 380);
    }
}, 6800);

// ====================== ИГРА ======================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const promptEl = document.getElementById('prompt');
const noteEl = document.getElementById('note');
const nightText = document.getElementById('night-text');

let player = { x: 180, y: 300, angle: 0 };
let currentNight = 1;
let chest1 = { x: 680, y: 240 };
let chest2 = { x: 720, y: 280 };
let door = { x: 920, y: 280 };
let wheelchairGuy = { x: 850, y: 420 }; // инвалид на коляске

let keys = {};
let gameActive = false;
let hasNote1 = false, hasNote2 = false, hasNote3 = false;

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

canvas.addEventListener('mousemove', (e) => {
    if (!gameActive) return;
    const rect = canvas.getBoundingClientRect();
    player.angle = Math.atan2(e.clientY - rect.top - player.y, e.clientX - rect.left - player.x);
});

function drawRoom() {
    ctx.fillStyle = '#020202';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawFlashlight() {
    const grad = ctx.createRadialGradient(player.x, player.y, 45,
        player.x + Math.cos(player.angle)*480, player.y + Math.sin(player.angle)*480, 520);
    grad.addColorStop(0, 'rgba(255,245,170,0.97)');
    grad.addColorStop(0.45, 'rgba(255,215,90,0.38)');
    grad.addColorStop(1, 'rgba(160,120,30,0)');
    ctx.save();
    ctx.beginPath();
    ctx.arc(player.x, player.y, 460, player.angle - 0.58, player.angle + 0.58);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();
}

function drawPlayer() {
    ctx.fillStyle = '#1e4d8c';
    ctx.fillRect(player.x-13, player.y+10, 9, 24);
    ctx.fillRect(player.x+4, player.y+10, 9, 24);
    ctx.fillStyle = '#3366dd';
    ctx.fillRect(player.x-15, player.y-10, 30, 30);
    ctx.fillRect(player.x-19, player.y-8, 8, 22);
    ctx.fillRect(player.x+11, player.y-8, 8, 22);
    ctx.fillStyle = '#ffddaa';
    ctx.fillRect(player.x-11, player.y-32, 22, 24);
    ctx.fillStyle = '#112233';
    ctx.fillRect(player.x-7, player.y-27, 6, 8);
    ctx.fillRect(player.x+2, player.y-27, 6, 8);
}

function drawChest(x, y) {
    ctx.fillStyle = '#b8860b';
    ctx.fillRect(x-32, y-28, 64, 56);
    ctx.fillStyle = '#654300';
    ctx.fillRect(x-26, y-38, 52, 16);
    ctx.fillStyle = '#333';
    ctx.fillRect(x-8, y-20, 16, 8); // замок
}

function drawWheelchairGuy() {
    ctx.fillStyle = '#555';
    ctx.fillRect(wheelchairGuy.x-25, wheelchairGuy.y-10, 50, 18); // коляска
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(wheelchairGuy.x-18, wheelchairGuy.y-35, 36, 28); // тело
    ctx.fillStyle = '#ffddaa';
    ctx.fillRect(wheelchairGuy.x-12, wheelchairGuy.y-48, 24, 20); // голова
}

function gameLoop() {
    if (!gameActive) return;

    drawRoom();
    drawFlashlight();
    drawPlayer();

    // Движение
    const speed = 6.2;
    if (keys['KeyW'] || keys['ArrowUp']) player.y -= speed;
    if (keys['KeyS'] || keys['ArrowDown']) player.y += speed;
    if (keys['KeyA'] || keys['ArrowLeft']) player.x -= speed;
    if (keys['KeyD'] || keys['ArrowRight']) player.x += speed;

    // Рисуем объекты
    drawChest(chest1.x, chest1.y);
    if (currentNight === 2) {
        drawChest(chest2.x, chest2.y);
        drawWheelchairGuy();
    }
    if (currentNight === 1) drawChest(door.x, door.y); // дверь

    // Взаимодействия
    const dist = (obj) => Math.hypot(obj.x - player.x, obj.y - player.y);

    // Сундук 1
    if (dist(chest1) < 75 && keys['KeyF'] && !hasNote1) {
        hasNote1 = true;
        noteEl.textContent = "сосать пендосы";
        noteEl.style.display = 'block';
        setTimeout(() => noteEl.style.display = 'none', 4000);
    }

    // Сундук 2 (Night 2)
    if (currentNight === 2 && dist(chest2) < 75 && keys['KeyF'] && !hasNote2) {
        hasNote2 = true;
        noteEl.textContent = "Когда токен $FNAB достигнет 1KK MC — будет страшный пост от команды Бейз";
        noteEl.style.display = 'block';
        setTimeout(() => noteEl.style.display = 'none', 5500);
    }

    // Инвалид на коляске
    if (currentNight === 2 && dist(wheelchairGuy) < 90 && keys['KeyF'] && !hasNote3) {
        hasNote3 = true;
        noteEl.textContent = "покупайте $liquid";
        noteEl.style.display = 'block';
        setTimeout(() => noteEl.style.display = 'none', 4500);
    }

    // Дверь
    if (currentNight === 1 && dist(door) < 85 && keys['KeyF']) {
        nightText.textContent = "NIGHT 2";
        nightText.style.display = 'block';
        
        portrait.src = 'baseroom-creepy.jpg';
        setTimeout(() => {
            portrait.src = 'baseroom-normal.jpg';
            nightText.style.display = 'none';
            currentNight = 2;
            player.x = 120;
            player.y = 300;
        }, 600);
    }

    promptEl.style.display = 
        (dist(chest1) < 75 || 
         (currentNight===2 && (dist(chest2)<75 || dist(wheelchairGuy)<90)) || 
         (currentNight===1 && dist(door)<85)) ? 'block' : 'none';

    requestAnimationFrame(gameLoop);
}

// Запуск
document.getElementById('new-game').addEventListener('click', () => {
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    gameActive = true;
    currentNight = 1;
    hasNote1 = hasNote2 = hasNote3 = false;
    player.x = 180; player.y = 300;
    gameLoop();
});

document.getElementById('continue').addEventListener('click', () => alert("Продолжение пока не реализовано"));
</script>
</body>
</html>
