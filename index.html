<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>5 Nights with Brian</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        background: #000;
        overflow: hidden;
        font-family: 'Courier New', monospace;
        height: 100vh;
        color: #aaffaa;
    }
    .crt {
        position: relative;
        width: 100vw;
        height: 100vh;
        background: #000;
        overflow: hidden;
    }
    canvas#noise, .scanlines {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 5;
    }
    .scanlines {
        background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(255,255,255,0.07) 2px, rgba(255,255,255,0.07) 4px);
        animation: scan 4s linear infinite;
    }
    @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

    .content {
        position: absolute;
        top: 28%;
        left: 12%;
        z-index: 10;
    }
    .title {
        font-size: 4.4rem;
        letter-spacing: 14px;
        text-transform: uppercase;
        text-shadow: 0 0 25px #aaffaa;
        margin-bottom: 70px;
        color: #aaffaa;
    }
    .menu-item {
        font-size: 2.3rem;
        line-height: 3rem;
        padding: 10px 0;
        cursor: pointer;
        transition: 0.2s;
    }
    .menu-item:hover {
        color: #ff6666;
        text-shadow: 0 0 20px #ff4444;
    }

    #game-screen {
        display: none;
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 20;
        background: #000;
    }
    .note {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #111;
        border: 5px solid #aaffaa;
        padding: 50px 80px;
        font-size: 3rem;
        color: #ff4444;
        display: none;
        z-index: 100;
        text-align: center;
        box-shadow: 0 0 50px #ff0000;
    }
    .prompt {
        position: absolute;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 1.8rem;
        color: #aaffaa;
        text-shadow: 0 0 15px #aaffaa;
        display: none;
        z-index: 50;
    }
</style>
</head>
<body>
<div class="crt">
    <canvas id="noise"></canvas>
    <img id="portrait" src="baseroom-normal.jpg" style="position:absolute; right:0; top:50%; transform:translateY(-50%); width:58%; height:100%; object-fit:cover; z-index:1; filter:contrast(1.15) brightness(0.9);">

    <!-- Главное меню -->
    <div class="content" id="menu-screen">
        <div class="title">5 NIGHTS WITH BRIAN</div>
        <div class="menu">
            <div class="menu-item" id="new-game">>> NEW GAME</div>
            <div class="menu-item" id="continue">>> CONTINUE</div>
        </div>
    </div>

    <!-- Мини-игра -->
    <div id="game-screen">
        <canvas id="game-canvas" width="1000" height="600"></canvas>
        <div class="prompt" id="prompt">НАЖМИ F</div>
        <div class="note" id="note">$FNAB</div>
    </div>

    <div class="scanlines"></div>
</div>

<script>
// CRT Noise
const noiseCanvas = document.getElementById('noise');
const nCtx = noiseCanvas.getContext('2d');
function resizeNoise() {
    noiseCanvas.width = window.innerWidth;
    noiseCanvas.height = window.innerHeight;
}
resizeNoise();
window.addEventListener('resize', resizeNoise);
function drawNoise() {
    const data = nCtx.createImageData(noiseCanvas.width, noiseCanvas.height);
    const buf = data.data;
    for (let i = 0; i < buf.length; i += 4) {
        const val = Math.random() * 255;
        buf[i] = buf[i+1] = buf[i+2] = val;
        buf[i+3] = 55;
    }
    nCtx.putImageData(data, 0, 0);
    requestAnimationFrame(drawNoise);
}
drawNoise();

// Jumpscare в меню
const portrait = document.getElementById('portrait');
setInterval(() => {
    if (document.getElementById('menu-screen').style.display !== 'none') {
        portrait.src = 'baseroom-creepy.jpg';
        setTimeout(() => portrait.src = 'baseroom-normal.jpg', 380);
    }
}, 6800);

// ====================== МИНИ-ИГРА ======================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const prompt = document.getElementById('prompt');
const note = document.getElementById('note');

let player = { x: 200, y: 320, angle: 0 };
let chest = { x: 750, y: 280 };
let keys = {};
let gameActive = false;
let hasNote = false;

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

canvas.addEventListener('mousemove', (e) => {
    if (!gameActive) return;
    const rect = canvas.getBoundingClientRect();
    player.angle = Math.atan2(e.clientY - rect.top - player.y, e.clientX - rect.left - player.x);
});

function drawRoom() {
    ctx.fillStyle = '#020202';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawFlashlight() {
    const grad = ctx.createRadialGradient(player.x, player.y, 50,
        player.x + Math.cos(player.angle)*450, player.y + Math.sin(player.angle)*450, 480);
    grad.addColorStop(0, 'rgba(255,245,160,0.98)');
    grad.addColorStop(0.5, 'rgba(255,210,80,0.4)');
    grad.addColorStop(1, 'rgba(180,140,30,0)');

    ctx.save();
    ctx.beginPath();
    ctx.arc(player.x, player.y, 430, player.angle - 0.6, player.angle + 0.6);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();
}

function drawPlayer() {
    // Ноги
    ctx.fillStyle = '#1e4d8c';
    ctx.fillRect(player.x-12, player.y+12, 8, 22);
    ctx.fillRect(player.x+4, player.y+12, 8, 22);
    // Тело
    ctx.fillStyle = '#3366dd';
    ctx.fillRect(player.x-14, player.y-8, 28, 28);
    // Руки
    ctx.fillRect(player.x-18, player.y-2, 8, 18);
    ctx.fillRect(player.x+10, player.y-2, 8, 18);
    // Голова
    ctx.fillStyle = '#ffddaa';
    ctx.fillRect(player.x-10, player.y-28, 20, 22);
    ctx.fillStyle = '#112233';
    ctx.fillRect(player.x-6, player.y-23, 5, 7);
    ctx.fillRect(player.x+2, player.y-23, 5, 7);
}

function drawChest() {
    const dx = chest.x - player.x;
    const dy = chest.y - player.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < 320) {
        ctx.fillStyle = '#b8860b';
        ctx.fillRect(chest.x-30, chest.y-25, 60, 50);
        ctx.fillStyle = '#654300';
        ctx.fillRect(chest.x-24, chest.y-35, 48, 14);
    }
}

function gameLoop() {
    if (!gameActive) return;

    drawRoom();
    drawFlashlight();

    // Движение
    const speed = 6;
    if (keys['ArrowUp'] || keys['KeyW'])    { player.y -= speed; }
    if (keys['ArrowDown'] || keys['KeyS'])  { player.y += speed; }
    if (keys['ArrowLeft'] || keys['KeyA'])  { player.x -= speed; }
    if (keys['ArrowRight'] || keys['KeyD']) { player.x += speed; }

    player.x = Math.max(50, Math.min(950, player.x));
    player.y = Math.max(50, Math.min(550, player.y));

    drawChest();
    drawPlayer();

    // Подсказка F
    const dx = chest.x - player.x;
    const dy = chest.y - player.y;
    const nearChest = Math.sqrt(dx*dx + dy*dy) < 80;

    prompt.style.display = nearChest ? 'block' : 'none';

    if (nearChest && keys['KeyF'] && !hasNote) {
        hasNote = true;
        note.style.display = 'block';
        setTimeout(() => note.style.display = 'none', 5000);
    }

    requestAnimationFrame(gameLoop);
}

// Запуск
document.getElementById('new-game').addEventListener('click', () => {
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    gameActive = true;
    hasNote = false;
    gameLoop();
});

document.getElementById('continue').addEventListener('click', () => {
    alert("Продолжение пока не реализовано");
});
</script>
</body>
</html>
