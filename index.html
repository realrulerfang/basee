<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>baseroom</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        background: #000;
        overflow: hidden;
        font-family: 'Courier New', monospace;
        height: 100vh;
        color: #00ff40;
    }

    .crt {
        position: relative;
        width: 100vw;
        height: 100vh;
        background: #000;
        border: 40px solid #0a0a0a;
        box-shadow: 
            0 0 90px rgba(0, 255, 80, 0.35),
            inset 0 0 140px rgba(0,0,0,0.98);
        overflow: hidden;
    }

    .screen {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding-right: 8%;
    }

    canvas#noise {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        opacity: 0.45;
        mix-blend-mode: screen;
        pointer-events: none;
        z-index: 1;
    }

    .scanlines {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: repeating-linear-gradient(
            to bottom,
            transparent 0px,
            transparent 4px,
            rgba(0, 255, 80, 0.08) 4px,
            rgba(0, 255, 80, 0.08) 8px
        );
        pointer-events: none;
        animation: scan 7s linear infinite;
        z-index: 3;
    }

    @keyframes scan { 
        0% { transform: translateY(-100%); } 
        100% { transform: translateY(100%); } 
    }

    .vignette {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        box-shadow: inset 0 0 180px #000;
        z-index: 4;
        pointer-events: none;
    }

    .content {
        position: relative;
        z-index: 5;
        text-align: center;
        margin-right: 5%;
    }

    .title {
        font-size: 4.8rem;
        letter-spacing: 14px;
        text-transform: uppercase;
        color: #00ff40;
        text-shadow: 0 0 25px #00ff40,
                     0 0 50px #008822;
        margin-bottom: 30px;
        animation: glitch 1.8s infinite;
    }

    .portrait {
        width: 460px;
        height: 460px;
        object-fit: cover;
        border: 14px solid #112211;
        box-shadow: 0 0 50px #00ff40,
                    inset 0 0 40px #000;
        background: #000;
        image-rendering: crisp-edges;
    }

    .menu {
        margin-top: 60px;
        font-size: 2.1rem;
        line-height: 2.6rem;
    }

    .menu-item {
        padding: 10px 50px;
        display: inline-block;
        cursor: pointer;
        transition: 0.2s;
    }

    .menu-item:hover {
        color: #ff3333;
        text-shadow: 0 0 20px #ff3333;
        background: rgba(255, 30, 30, 0.1);
    }

    .static-text {
        margin-top: 70px;
        font-size: 1.2rem;
        letter-spacing: 4px;
        opacity: 0.75;
    }

    @keyframes glitch {
        0%,100% { text-shadow: 4px 4px #ff00ff, -4px -4px #00ffff; }
        25% { text-shadow: -4px -4px #ff00ff, 4px 4px #00ffff; }
    }
</style>
</head>
<body>

<div class="crt">
    <div class="screen">
        <canvas id="noise"></canvas>
        
        <div class="content">
            <div class="title">baseroom</div>
            
            <img id="portrait" src="baseroom-normal.jpg" class="portrait" alt="">
            
            <div class="menu">
                <div class="menu-item">>> NEW GAME</div><br>
                <div class="menu-item">>> CONTINUE</div>
            </div>
            
            <div class="static-text">NIGHT 1 • SYSTEM BOOT SEQUENCE</div>
        </div>

        <div class="scanlines"></div>
        <div class="vignette"></div>
    </div>
</div>

<script>
// Canvas noise — плотный FNAF-стиль
const canvas = document.getElementById('noise');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function drawNoise() {
    const imageData = ctx.createImageData(canvas.width, canvas.height);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
        const noise = Math.random() * 255;
        data[i] = data[i+1] = data[i+2] = noise;
        data[i+3] = 58;
    }
    ctx.putImageData(imageData, 0, 0);
    requestAnimationFrame(drawNoise);
}
drawNoise();

// Жуткая версия каждые 5 секунд
const portrait = document.getElementById('portrait');

setInterval(() => {
    portrait.src = 'baseroom-creepy.jpg';
    setTimeout(() => {
        portrait.src = 'baseroom-normal.jpg';
    }, 420 + Math.random() * 180);
}, 5000);
</script>

</body>
</html>
