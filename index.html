<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>1 Night with Brian</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        background: #000;
        overflow: hidden;
        font-family: 'Courier New', monospace;
        height: 100vh;
        color: #aaffaa;
    }
    .crt {
        position: relative;
        width: 100vw;
        height: 100vh;
        background: #000;
        overflow: hidden;
    }
    canvas#noise, .scanlines {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 5;
    }
    .scanlines {
        background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(255,255,255,0.07) 2px, rgba(255,255,255,0.07) 4px);
        animation: scan 4s linear infinite;
    }
    @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
    .content {
        position: absolute;
        top: 28%;
        left: 7%;
        z-index: 10;
    }
    .title {
        font-size: 4.35rem;
        letter-spacing: 12px;
        text-transform: uppercase;
        text-shadow: 0 0 25px #aaffaa;
        margin-bottom: 65px;
        color: #aaffaa;
    }
    .menu-item {
        font-size: 2.3rem;
        line-height: 3rem;
        padding: 10px 0;
        cursor: pointer;
        transition: 0.2s;
    }
    .menu-item:hover {
        color: #ff6666;
        text-shadow: 0 0 20px #ff4444;
    }
    #game-screen {
        display: none;
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 20;
        background: #000;
    }
    #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
    }
    .note {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #111;
        border: 5px solid #aaffaa;
        padding: 45px 70px;
        font-size: 2.3rem;
        color: #ff4444;
        display: none;
        z-index: 100;
        text-align: center;
        box-shadow: 0 0 50px #ff0000;
    }
    .prompt {
        position: absolute;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 1.9rem;
        color: #aaffaa;
        text-shadow: 0 0 15px #aaffaa;
        display: none;
        z-index: 50;
    }
    .timer {
        position: absolute;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 2.1rem;
        color: #ff6666;
        display: none;
        z-index: 60;
    }
</style>
</head>
<body>
<div class="crt">
    <canvas id="noise"></canvas>
    <img id="portrait" src="baseroom-normal.jpg" style="position:absolute; right:30px; top:50%; transform:translateY(-50%); width:44%; height:90%; object-fit:cover; z-index:1; filter:contrast(1.12) brightness(0.93);">
    <div class="content" id="menu-screen">
        <div class="title">1 NIGHT WITH BRIAN</div>
        <div class="menu">
            <div class="menu-item" id="new-game">>> NEW GAME</div>
        </div>
    </div>
    <div id="game-screen">
        <canvas id="game-canvas" tabindex="0"></canvas>
        <div class="prompt" id="prompt">PRESS F</div>
        <div class="note" id="note"></div>
        <div class="timer" id="timer">20</div>
    </div>
    <div class="scanlines"></div>
</div>

<img id="liquid-img" src="/home/workdir/attachments/liquid.png" style="display:none;">

<script>
// CRT + Noise
const noiseCanvas = document.getElementById('noise');
const nCtx = noiseCanvas.getContext('2d');
function resizeNoise(){ 
    noiseCanvas.width = window.innerWidth; 
    noiseCanvas.height = window.innerHeight; 
}
resizeNoise(); 
window.addEventListener('resize', resizeNoise);
function drawNoise(){
    const data = nCtx.createImageData(noiseCanvas.width, noiseCanvas.height);
    const buf = data.data;
    for(let i=0;i<buf.length;i+=4){ 
        const val=Math.random()*255; 
        buf[i]=buf[i+1]=buf[i+2]=val; 
        buf[i+3]=55; 
    }
    nCtx.putImageData(data,0,0); 
    requestAnimationFrame(drawNoise);
}
drawNoise();

// Скример
const portrait = document.getElementById('portrait');
setInterval(() => {
    if (document.getElementById('menu-screen').style.display !== 'none') {
        portrait.src = 'baseroom-creepy.jpg';
        setTimeout(() => { portrait.src = 'baseroom-normal.jpg'; }, 300);
    }
}, 5000);

// ====================== ИГРА ======================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const promptEl = document.getElementById('prompt');
const noteEl = document.getElementById('note');
const timerEl = document.getElementById('timer');
const liquidImg = document.getElementById('liquid-img');

let player = { x: 200, y: 300, angle: 0 };
let keys = {};
let gameActive = false;
let timerActive = false;
let timerInterval = null;

const chests = [
    { x: 250, y: 120, num: "01", text: "all similarities are purely coincidental." },
    { x: 550, y: 480, num: "02", text: "base will change the world\ndeployer is a robot not real human" },
    { x: 950, y: 150, num: "03", text: "brian Brian is a Reptilian" },
    { x: 380, y: 510, num: "04", text: "When this $fnab token reaches a 1M market cap,\nsomething terrible will happen." },
    { x: 820, y: 320, num: "05", text: "Brian is coming" }
];

const liquidGuy = { x: 980, y: 380 };

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

canvas.addEventListener('mousemove', (e) => {
    if (!gameActive) return;
    const rect = canvas.getBoundingClientRect();
    player.angle = Math.atan2(e.clientY - rect.top - player.y, e.clientX - rect.left - player.x);
});

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function drawRoom() {
    ctx.fillStyle = '#020202';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawFlashlight() {
    const grad = ctx.createRadialGradient(player.x, player.y, 45,
        player.x + Math.cos(player.angle)*800, player.y + Math.sin(player.angle)*800, 900);
    grad.addColorStop(0, 'rgba(255,245,170,0.97)');
    grad.addColorStop(0.45, 'rgba(255,215,90,0.38)');
    grad.addColorStop(1, 'rgba(160,120,30,0)');
    ctx.save();
    ctx.beginPath();
    ctx.arc(player.x, player.y, 900, player.angle - 0.6, player.angle + 0.6);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();
}

function drawPlayer() {
    ctx.fillStyle = '#1e4d8c';
    ctx.fillRect(player.x-13, player.y+10, 9, 24);
    ctx.fillRect(player.x+4, player.y+10, 9, 24);
    ctx.fillStyle = '#3366dd';
    ctx.fillRect(player.x-15, player.y-10, 30, 30);
    ctx.fillRect(player.x-19, player.y-8, 8, 22);
    ctx.fillRect(player.x+11, player.y-8, 8, 22);
    ctx.fillStyle = '#ffddaa';
    ctx.fillRect(player.x-11, player.y-32, 22, 24);
    ctx.fillStyle = '#112233';
    ctx.fillRect(player.x-7, player.y-27, 6, 8);
    ctx.fillRect(player.x+2, player.y-27, 6, 8);
}

function drawChest(c) {
    ctx.fillStyle = '#b8860b';
    ctx.fillRect(c.x-34, c.y-32, 68, 62);
    ctx.fillStyle = '#654300';
    ctx.fillRect(c.x-28, c.y-42, 56, 18);
    ctx.fillStyle = '#222';
    ctx.fillRect(c.x-12, c.y-24, 24, 14);
    ctx.fillStyle = '#ddd';
    ctx.fillRect(c.x-6, c.y-20, 12, 6);
   
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 20px Courier New';
    ctx.fillText(c.num, c.x-9, c.y-8);
}

function drawLiquidGuy() {
    if (liquidImg.complete) {
        ctx.drawImage(liquidImg, liquidGuy.x - 55, liquidGuy.y - 105, 110, 145);
    }
}

function startReturnTimer() {
    if (timerActive) return;
    timerActive = true;
    let time = 20;
    timerEl.textContent = `00:${time}`;
    timerEl.style.display = 'block';
    timerInterval = setInterval(() => {
        time--;
        timerEl.textContent = `00:${time < 10 ? '0' : ''}${time}`;
        if (time <= 0) {
            clearInterval(timerInterval);
            timerEl.style.display = 'none';
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'block';
            gameActive = false;
        }
    }, 1000);
}

function gameLoop() {
    if (!gameActive) return;
    drawRoom();
    drawFlashlight();
    drawPlayer();

    const speed = 4.2;
    if (keys['KeyW'] || keys['ArrowUp']) player.y -= speed;
    if (keys['KeyS'] || keys['ArrowDown']) player.y += speed;
    if (keys['KeyA'] || keys['ArrowLeft']) player.x -= speed;
    if (keys['KeyD'] || keys['ArrowRight']) player.x += speed;

    player.x = Math.max(60, Math.min(canvas.width - 60, player.x));
    player.y = Math.max(60, Math.min(canvas.height - 60, player.y));

    chests.forEach(c => drawChest(c));
    drawLiquidGuy();

    const dist = (obj) => Math.hypot(obj.x - player.x, obj.y - player.y);
    let near = false;

    chests.forEach(chest => {
        if (dist(chest) < 85) near = true;
        if (dist(chest) < 85 && keys['KeyF']) {
            noteEl.textContent = chest.text;
            noteEl.style.display = 'block';
            startReturnTimer();
            setTimeout(() => noteEl.style.display = 'none', 5000);
        }
    });

    if (dist(liquidGuy) < 110) near = true;
    if (dist(liquidGuy) < 110 && keys['KeyF']) {
        noteEl.textContent = "BUY $LIQUID";
        noteEl.style.display = 'block';
        startReturnTimer();
        setTimeout(() => noteEl.style.display = 'none', 4000);
    }

    promptEl.style.display = near ? 'block' : 'none';
    requestAnimationFrame(gameLoop);
}

// Запуск
document.getElementById('new-game').addEventListener('click', () => {
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    gameActive = true;
    timerActive = false;
    player.x = 200; 
    player.y = 300;
    
    canvas.focus();
    resizeCanvas();
    gameLoop();
});
</script>
</body>
</html>
