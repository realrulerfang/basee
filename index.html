<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>baseroom</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        background: #000;
        overflow: hidden;
        font-family: 'Courier New', monospace;
        height: 100vh;
        color: #aaffaa;
    }

    .crt {
        position: relative;
        width: 100vw;
        height: 100vh;
        background: #050505;
        border: 40px solid #111;
        box-shadow: inset 0 0 200px #000;
        overflow: hidden;
    }

    canvas#noise {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        opacity: 0.85;
        mix-blend-mode: screen;
        z-index: 2;
    }

    .scanlines {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: repeating-linear-gradient(
            to bottom,
            transparent 0px,
            transparent 2px,
            rgba(255,255,255,0.07) 2px,
            rgba(255,255,255,0.07) 4px
        );
        pointer-events: none;
        animation: scan 4s linear infinite;
        z-index: 3;
    }

    @keyframes scan { 
        0% { transform: translateY(-100%); } 
        100% { transform: translateY(100%); } 
    }

    .portrait {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 58%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        z-index: 1;
        filter: contrast(1.15) brightness(0.85);
    }

    .content {
        position: relative;
        z-index: 5;
        padding-left: 10%;
        margin-top: 18%;
    }

    .title {
        font-size: 4.2rem;
        letter-spacing: 10px;
        text-transform: uppercase;
        line-height: 1.1;
        text-shadow: 0 0 20px #aaffaa;
        margin-bottom: 40px;
    }

    .menu {
        font-size: 2.1rem;
        line-height: 2.6rem;
    }

    .menu-item {
        padding: 8px 0;
        cursor: pointer;
        transition: 0.15s;
    }

    .menu-item:hover {
        color: #ff6666;
        text-shadow: 0 0 15px #ff4444;
    }

    .static-text {
        margin-top: 90px;
        font-size: 1.3rem;
        letter-spacing: 6px;
        opacity: 0.8;
    }
</style>
</head>
<body>

<div class="crt">
    <canvas id="noise"></canvas>
    
    <!-- Фотка как в FNAF (справа) -->
    <img id="portrait" src="baseroom-normal.jpg" class="portrait" alt="">
    
    <div class="content">
        <div class="title">baseroom</div>
        
        <div class="menu">
            <div class="menu-item">>> NEW GAME</div>
            <div class="menu-item">>> CONTINUE</div>
        </div>
        
        <div class="static-text">NIGHT 1</div>
    </div>

    <div class="scanlines"></div>
</div>

<script>
// Очень сильный FNAF-шум
const canvas = document.getElementById('noise');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function drawNoise() {
    const w = canvas.width;
    const h = canvas.height;
    const imageData = ctx.createImageData(w, h);
    const data = imageData.data;

    for (let i = 0; i < data.length; i += 4) {
        const val = Math.random() * 255;
        data[i] = data[i+1] = data[i+2] = val;
        data[i+3] = 95; // очень плотный шум
    }
    ctx.putImageData(imageData, 0, 0);
    requestAnimationFrame(drawNoise);
}
drawNoise();

// Жуткая версия
const portrait = document.getElementById('portrait');

setInterval(() => {
    portrait.src = 'baseroom-creepy.jpg';
    setTimeout(() => {
        portrait.src = 'baseroom-normal.jpg';
    }, 400 + Math.random() * 300);
}, 4800);
</script>

</body>
</html>
