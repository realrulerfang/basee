<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>5 Nights with Brian</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        background: #000;
        overflow: hidden;
        font-family: 'Courier New', monospace;
        height: 100vh;
        color: #aaffaa;
    }
    .crt {
        position: relative;
        width: 100vw;
        height: 100vh;
        background: #000;
        overflow: hidden;
    }
    canvas#noise, .scanlines {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 5;
    }
    .scanlines {
        background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(255,255,255,0.06) 2px, rgba(255,255,255,0.06) 4px);
        animation: scan 4s linear infinite;
    }
    @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

    .content {
        position: absolute;
        top: 35%;
        left: 18%;
        z-index: 10;
    }
    .title {
        font-size: 4.5rem;
        letter-spacing: 12px;
        text-transform: uppercase;
        text-shadow: 0 0 25px #aaffaa;
        margin-bottom: 60px;
    }
    .menu-item {
        font-size: 2.3rem;
        line-height: 3rem;
        padding: 10px 0;
        cursor: pointer;
        transition: 0.2s;
    }
    .menu-item:hover {
        color: #ff6666;
        text-shadow: 0 0 20px #ff4444;
    }

    #game-screen {
        display: none;
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 20;
        background: #000;
    }
</style>
</head>
<body>
<div class="crt">
    <canvas id="noise"></canvas>

    <!-- Главное меню -->
    <div class="content" id="menu-screen">
        <div class="title">5 NIGHTS WITH BRIAN</div>
        <div class="menu">
            <div class="menu-item" id="new-game">>> NEW GAME</div>
            <div class="menu-item" id="continue">>> CONTINUE</div>
        </div>
    </div>

    <!-- Новая игра: Тёмная комната -->
    <div id="game-screen">
        <canvas id="game-canvas" width="1000" height="600"></canvas>
    </div>

    <div class="scanlines"></div>
</div>

<script>
// CRT Noise
const noiseCanvas = document.getElementById('noise');
const nCtx = noiseCanvas.getContext('2d');
function resizeNoise() {
    noiseCanvas.width = window.innerWidth;
    noiseCanvas.height = window.innerHeight;
}
resizeNoise();
window.addEventListener('resize', resizeNoise);

function drawNoise() {
    const data = nCtx.createImageData(noiseCanvas.width, noiseCanvas.height);
    const buf = data.data;
    for (let i = 0; i < buf.length; i += 4) {
        const val = Math.random() * 255;
        buf[i] = buf[i+1] = buf[i+2] = val;
        buf[i+3] = 55;
    }
    nCtx.putImageData(data, 0, 0);
    requestAnimationFrame(drawNoise);
}
drawNoise();

// Скример в меню
const portrait = document.getElementById('portrait') || {src: ''};
setInterval(() => {
    if (document.getElementById('menu-screen').style.display !== 'none') {
        // можно добавить картинку если нужно
    }
}, 7000);

// ====================== НОВАЯ ИГРА ======================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

let player = { x: 500, y: 300, angle: 0 };
let chest = { x: 750, y: 180 };
let keys = {};
let gameActive = false;

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

canvas.addEventListener('mousemove', (e) => {
    if (!gameActive) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    player.angle = Math.atan2(my - player.y, mx - player.x);
});

function drawDarkRoom() {
    ctx.fillStyle = '#050505';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Пол
    ctx.fillStyle = '#111';
    ctx.fillRect(0, canvas.height/2, canvas.width, canvas.height/2);

    // Стены (простая имитация 3D)
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, canvas.width, canvas.height/2);
}

function drawFlashlight() {
    const gradient = ctx.createRadialGradient(
        player.x, player.y, 30,
        player.x + Math.cos(player.angle)*300, player.y + Math.sin(player.angle)*300, 280
    );
    
    gradient.addColorStop(0, 'rgba(255, 240, 180, 0.95)');
    gradient.addColorStop(0.4, 'rgba(255, 220, 100, 0.45)');
    gradient.addColorStop(1, 'rgba(255, 200, 60, 0)');

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(player.x, player.y);
    ctx.arc(player.x, player.y, 320, player.angle - 0.6, player.angle + 0.6);
    ctx.lineTo(player.x, player.y);
    ctx.fillStyle = gradient;
    ctx.fill();
    ctx.restore();
}

function drawChest() {
    const dx = chest.x - player.x;
    const dy = chest.y - player.y;
    const distance = Math.sqrt(dx*dx + dy*dy);
    
    if (distance < 280) {
        ctx.fillStyle = '#d4a017';
        ctx.fillRect(chest.x - 25, chest.y - 20, 50, 40);
        ctx.fillStyle = '#8b5a00';
        ctx.fillRect(chest.x - 20, chest.y - 25, 40, 12);
    }
}

function drawPlayer() {
    ctx.fillStyle = '#44aaff';
    ctx.fillRect(player.x - 12, player.y - 18, 24, 36);
}

function gameLoop() {
    if (!gameActive) return;

    drawDarkRoom();

    // Движение
    const speed = 5.5;
    if (keys['KeyW'] || keys['ArrowUp']) {
        player.x += Math.cos(player.angle) * speed;
        player.y += Math.sin(player.angle) * speed;
    }
    if (keys['KeyS'] || keys['ArrowDown']) {
        player.x -= Math.cos(player.angle) * speed * 0.7;
        player.y -= Math.sin(player.angle) * speed * 0.7;
    }
    if (keys['KeyA'] || keys['ArrowLeft']) player.x -= speed * 0.9;
    if (keys['KeyD'] || keys['ArrowRight']) player.x += speed * 0.9;

    // Ограничения
    player.x = Math.max(40, Math.min(canvas.width - 40, player.x));
    player.y = Math.max(40, Math.min(canvas.height - 40, player.y));

    drawFlashlight();
    drawChest();
    drawPlayer();

    requestAnimationFrame(gameLoop);
}

document.getElementById('new-game').addEventListener('click', () => {
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    gameActive = true;
    gameLoop();
});

document.getElementById('continue').addEventListener('click', () => {
    alert("Продолжение пока не реализовано :)");
});
</script>
</body>
</html>
