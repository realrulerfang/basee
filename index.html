<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>1 Night with Brian</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        background: #000;
        overflow: hidden;
        font-family: 'Courier New', monospace;
        height: 100vh;
        color: #aaffaa;
    }
    .crt {
        position: relative;
        width: 100vw;
        height: 100vh;
        background: #000;
        overflow: hidden;
    }
    canvas#noise, .scanlines {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 5;
    }
    .scanlines {
        background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(255,255,255,0.07) 2px, rgba(255,255,255,0.07) 4px);
        animation: scan 4s linear infinite;
    }
    @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

    .content {
        position: absolute;
        top: 32%;
        left: 8%;
        z-index: 10;
    }
    .title {
        font-size: 4.8rem;
        letter-spacing: 12px;
        text-transform: uppercase;
        text-shadow: 0 0 25px #aaffaa;
        margin-bottom: 60px;
        color: #aaffaa;
    }
    .menu-item {
        font-size: 2.3rem;
        line-height: 3rem;
        padding: 10px 0;
        cursor: pointer;
        transition: 0.2s;
    }
    .menu-item:hover {
        color: #ff6666;
        text-shadow: 0 0 20px #ff4444;
    }

    #game-screen {
        display: none;
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 20;
        background: #000;
    }
    .note {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #111;
        border: 5px solid #aaffaa;
        padding: 45px 70px;
        font-size: 2.3rem;
        color: #ff4444;
        display: none;
        z-index: 100;
        text-align: center;
        box-shadow: 0 0 50px #ff0000;
    }
    .prompt {
        position: absolute;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 1.9rem;
        color: #aaffaa;
        text-shadow: 0 0 15px #aaffaa;
        display: none;
        z-index: 50;
    }
</style>
</head>
<body>
<div class="crt">
    <canvas id="noise"></canvas>
    <img id="portrait" src="baseroom-normal.jpg" style="position:absolute; right:40px; top:50%; transform:translateY(-50%); width:48%; height:85%; object-fit:cover; z-index:1; filter:contrast(1.15) brightness(0.9);">

    <div class="content" id="menu-screen">
        <div class="title">1 NIGHT WITH BRIAN</div>
        <div class="menu">
            <div class="menu-item" id="new-game">>> NEW GAME</div>
            <div class="menu-item" id="continue">>> CONTINUE</div>
        </div>
    </div>

    <div id="game-screen">
        <canvas id="game-canvas" width="1000" height="600"></canvas>
        <div class="prompt" id="prompt">PRESS F</div>
        <div class="note" id="note"></div>
    </div>

    <div class="scanlines"></div>
</div>

<script>
// CRT Noise
const noiseCanvas = document.getElementById('noise');
const nCtx = noiseCanvas.getContext('2d');
function resizeNoise(){ noiseCanvas.width = window.innerWidth; noiseCanvas.height = window.innerHeight; }
resizeNoise(); window.addEventListener('resize', resizeNoise);
function drawNoise(){
    const data = nCtx.createImageData(noiseCanvas.width, noiseCanvas.height);
    const buf = data.data;
    for(let i=0;i<buf.length;i+=4){ const val=Math.random()*255; buf[i]=buf[i+1]=buf[i+2]=val; buf[i+3]=55; }
    nCtx.putImageData(data,0,0); requestAnimationFrame(drawNoise);
}
drawNoise();

const portrait = document.getElementById('portrait');
setInterval(() => {
    if (document.getElementById('menu-screen').style.display !== 'none') {
        portrait.src = 'baseroom-creepy.jpg';
        setTimeout(() => portrait.src = 'baseroom-normal.jpg', 380);
    }
}, 6800);

// ====================== ОДНА КОМНАТА ======================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const promptEl = document.getElementById('prompt');
const noteEl = document.getElementById('note');

let player = { x: 150, y: 300, angle: 0 };
let keys = {};
let gameActive = false;

const chests = [
    { x: 380, y: 220, num: "01", text: "SUCK PENDEJOS" },
    { x: 520, y: 340, num: "02", text: "WHEN $FNAB HITS 1KK MC — SCARY POST FROM BASE" },
    { x: 680, y: 180, num: "03", text: "BUY $LIQUID" },
    { x: 780, y: 380, num: "04", text: "BRIAN IS COMING" },
    { x: 850, y: 240, num: "05", text: "THIS GAME TELLS THE TRUTH" }
];

const wheelchairGuy = { x: 880, y: 420 };

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

canvas.addEventListener('mousemove', (e) => {
    if (!gameActive) return;
    const rect = canvas.getBoundingClientRect();
    player.angle = Math.atan2(e.clientY - rect.top - player.y, e.clientX - rect.left - player.x);
});

function drawRoom() {
    ctx.fillStyle = '#020202';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawFlashlight() {
    const grad = ctx.createRadialGradient(player.x, player.y, 45,
        player.x + Math.cos(player.angle)*480, player.y + Math.sin(player.angle)*480, 520);
    grad.addColorStop(0, 'rgba(255,245,170,0.97)');
    grad.addColorStop(0.45, 'rgba(255,215,90,0.38)');
    grad.addColorStop(1, 'rgba(160,120,30,0)');
    ctx.save();
    ctx.beginPath();
    ctx.arc(player.x, player.y, 460, player.angle - 0.58, player.angle + 0.58);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();
}

function drawPlayer() {
    ctx.fillStyle = '#1e4d8c';
    ctx.fillRect(player.x-13, player.y+10, 9, 24);
    ctx.fillRect(player.x+4, player.y+10, 9, 24);
    ctx.fillStyle = '#3366dd';
    ctx.fillRect(player.x-15, player.y-10, 30, 30);
    ctx.fillRect(player.x-19, player.y-8, 8, 22);
    ctx.fillRect(player.x+11, player.y-8, 8, 22);
    ctx.fillStyle = '#ffddaa';
    ctx.fillRect(player.x-11, player.y-32, 22, 24);
    ctx.fillStyle = '#112233';
    ctx.fillRect(player.x-7, player.y-27, 6, 8);
    ctx.fillRect(player.x+2, player.y-27, 6, 8);
}

function drawChest(c) {
    ctx.fillStyle = '#b8860b';
    ctx.fillRect(c.x-32, c.y-28, 64, 56);
    ctx.fillStyle = '#654300';
    ctx.fillRect(c.x-26, c.y-38, 52, 16);
    ctx.fillStyle = '#222';
    ctx.fillRect(c.x-10, c.y-20, 20, 12);
    
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px Courier New';
    ctx.fillText(c.num, c.x-8, c.y-5);
}

function drawWheelchairGuy() {
    ctx.fillStyle = '#333';
    ctx.fillRect(wheelchairGuy.x-28, wheelchairGuy.y-8, 56, 18);
    ctx.fillStyle = '#444';
    ctx.fillRect(wheelchairGuy.x-18, wheelchairGuy.y-38, 36, 32);
    ctx.fillStyle = '#ffddaa';
    ctx.fillRect(wheelchairGuy.x-12, wheelchairGuy.y-52, 24, 22);
    
    // Светящаяся капелька
    ctx.fillStyle = '#00ffff';
    ctx.beginPath();
    ctx.arc(wheelchairGuy.x+8, wheelchairGuy.y-65, 6, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#88ffff';
    ctx.beginPath();
    ctx.arc(wheelchairGuy.x+8, wheelchairGuy.y-65, 3, 0, Math.PI*2);
    ctx.fill();
}

function gameLoop() {
    if (!gameActive) return;

    drawRoom();
    drawFlashlight();
    drawPlayer();

    const speed = 6.2;
    if (keys['KeyW'] || keys['ArrowUp']) player.y -= speed;
    if (keys['KeyS'] || keys['ArrowDown']) player.y += speed;
    if (keys['KeyA'] || keys['ArrowLeft']) player.x -= speed;
    if (keys['KeyD'] || keys['ArrowRight']) player.x += speed;

    // Рисуем сундуки
    chests.forEach(chest => drawChest(chest));
    drawWheelchairGuy();

    const dist = (obj) => Math.hypot(obj.x - player.x, obj.y - player.y);

    let near = false;

    // Проверка сундуков
    chests.forEach((chest, i) => {
        if (dist(chest) < 75 && keys['KeyF']) {
            noteEl.textContent = chest.text;
            noteEl.style.display = 'block';
            setTimeout(() => noteEl.style.display = 'none', 4500);
        }
        if (dist(chest) < 75) near = true;
    });

    // Инвалид
    if (dist(wheelchairGuy) < 90 && keys['KeyF']) {
        noteEl.textContent = "BUY $LIQUID";
        noteEl.style.display = 'block';
        setTimeout(() => noteEl.style.display = 'none', 4000);
    }
    if (dist(wheelchairGuy) < 90) near = true;

    promptEl.style.display = near ? 'block' : 'none';

    requestAnimationFrame(gameLoop);
}

// Запуск
document.getElementById('new-game').addEventListener('click', () => {
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    gameActive = true;
    player.x = 150; player.y = 300;
    gameLoop();
});

document.getElementById('continue').addEventListener('click', () => alert("Продолжение пока не реализовано"));
</script>
</body>
</html>
