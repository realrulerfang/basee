<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>5 Nights with Brian</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        background: #000;
        overflow: hidden;
        font-family: 'Courier New', monospace;
        height: 100vh;
        color: #aaffaa;
    }
    .crt {
        position: relative;
        width: 100vw;
        height: 100vh;
        background: #000;
        border: 40px solid #111;
        box-shadow: inset 0 0 200px #000;
        overflow: hidden;
    }
    canvas#noise, .scanlines {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 30;
    }
    .scanlines {
        background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(255,255,255,0.08) 2px, rgba(255,255,255,0.08) 4px);
        animation: scan 4s linear infinite;
    }
    @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

    .portrait {
        position: absolute;
        right: 0; top: 50%;
        transform: translateY(-50%);
        width: 58%; height: 100%;
        object-fit: cover;
        z-index: 1;
        filter: contrast(1.2) brightness(0.85);
        background: #000;
    }

    .content, #game-screen {
        position: relative;
        z-index: 10;
    }
    .title {
        font-size: 4.2rem;
        letter-spacing: 10px;
        text-transform: uppercase;
        text-shadow: 0 0 20px #aaffaa;
        margin-bottom: 40px;
    }
    .menu-item {
        font-size: 2.1rem;
        line-height: 2.6rem;
        padding: 8px 0;
        cursor: pointer;
        transition: 0.2s;
    }
    .menu-item:hover { color: #ff6666; text-shadow: 0 0 15px #ff4444; }

    /* Мини-игра */
    #game-screen {
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100%;
        background: rgba(0,0,0,0.9);
    }
    #game-canvas {
        image-rendering: pixelated;
        border: 6px solid #222;
        box-shadow: 0 0 40px #000;
    }
    #game-info {
        margin-top: 12px;
        font-size: 1.7rem;
    }
    .game-over-screen {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.95);
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 50;
        color: #ff4444;
    }
    .back-btn {
        margin-top: 40px;
        padding: 12px 30px;
        font-size: 1.8rem;
        background: #111;
        border: 3px solid #aaffaa;
        color: #aaffaa;
        cursor: pointer;
    }
    .back-btn:hover {
        background: #aaffaa;
        color: #000;
    }
</style>
</head>
<body>
<div class="crt">
    <canvas id="noise"></canvas>
    <img id="portrait" src="baseroom-normal.jpg" class="portrait" alt="">

    <!-- Меню -->
    <div class="content" id="menu-screen">
        <div class="title">5 NIGHTS WITH BRIAN</div>
        <div class="menu">
            <div class="menu-item" id="new-game">>> NEW GAME</div>
            <div class="menu-item" id="continue">>> CONTINUE</div>
        </div>
        <div class="static-text">NIGHT 1</div>
    </div>

    <!-- Игра -->
    <div id="game-screen">
        <canvas id="game-canvas" width="800" height="450"></canvas>
        <div id="game-info">ВРЕМЯ: <span id="timer">40</span>s</div>
    </div>

    <!-- Game Over + Screamer -->
    <div class="game-over-screen" id="game-over-screen">
        <img id="screamer" src="baseroom-creepy.jpg" style="width:100%; height:100%; object-fit:cover; display:none;">
        <div style="font-size:6rem; margin-bottom:30px;">GAME OVER</div>
        <div class="back-btn" id="back-btn">BACK TO MENU</div>
    </div>

    <div class="scanlines"></div>
</div>

<script>
// CRT Noise
const noiseCanvas = document.getElementById('noise');
const nCtx = noiseCanvas.getContext('2d');
function resizeNoise() { noiseCanvas.width = window.innerWidth; noiseCanvas.height = window.innerHeight; }
resizeNoise();
window.addEventListener('resize', resizeNoise);
function drawNoise() {
    const data = nCtx.createImageData(noiseCanvas.width, noiseCanvas.height);
    const buf = data.data;
    for (let i = 0; i < buf.length; i += 4) {
        const val = Math.random() * 255;
        buf[i] = buf[i+1] = buf[i+2] = val;
        buf[i+3] = 65;
    }
    nCtx.putImageData(data, 0, 0);
    requestAnimationFrame(drawNoise);
}
drawNoise();

// ====================== 8-БИТ ТУННЕЛЬ ======================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const timerEl = document.getElementById('timer');
const gameOverScreen = document.getElementById('game-over-screen');
const screamerImg = document.getElementById('screamer');

let gameActive = false;
let timeLeft = 40;
let timerInterval;

const player = { x: 80, y: 280, width: 45, height: 80, speed: 7 };
const enemy = { x: 750, y: 260, width: 48, height: 85, speed: 5.2 };

let keys = {};

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function drawTunnel() {
    // Фон туннеля
    ctx.fillStyle = '#0a0505';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Стены туннеля (перспектива)
    ctx.fillStyle = '#1a0f0f';
    ctx.fillRect(0, 150, canvas.width, 300);

    // Линии перспективы
    ctx.strokeStyle = '#331111';
    ctx.lineWidth = 4;
    for (let i = 0; i < 6; i++) {
        let y = 150 + i * 45;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }
}

function drawPlayer() {
    // Тело
    ctx.fillStyle = '#4488ff';
    ctx.fillRect(player.x + 8, player.y + 25, 30, 55);
    // Голова
    ctx.fillStyle = '#ffddaa';
    ctx.fillRect(player.x + 12, player.y + 10, 22, 22);
    // Глаза
    ctx.fillStyle = '#000';
    ctx.fillRect(player.x + 17, player.y + 16, 5, 5);
    ctx.fillRect(player.x + 27, player.y + 16, 5, 5);
}

function drawEnemy() {
    // Тело
    ctx.fillStyle = '#992222';
    ctx.fillRect(enemy.x + 6, enemy.y + 20, 36, 65);
    // Голова
    ctx.fillStyle = '#662222';
    ctx.fillRect(enemy.x + 10, enemy.y + 8, 28, 25);
    // Красные глаза
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(enemy.x + 16, enemy.y + 14, 7, 8);
    ctx.fillRect(enemy.x + 28, enemy.y + 14, 7, 8);
}

function gameLoop() {
    if (!gameActive) return;

    drawTunnel();

    // Управление
    if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;

    // Ограничения
    if (player.x < 20) player.x = 20;
    if (player.x > 380) player.x = 380;

    drawPlayer();
    drawEnemy();

    // Враг движется
    enemy.x -= enemy.speed;
    if (enemy.x < -60) enemy.x = 850;

    // Коллизия
    if (
        player.x < enemy.x + enemy.width - 10 &&
        player.x + player.width > enemy.x + 10 &&
        player.y < enemy.y + enemy.height &&
        player.y + player.height > enemy.y + 10
    ) {
        triggerScreamer();
        return;
    }

    requestAnimationFrame(gameLoop);
}

function triggerScreamer() {
    gameActive = false;
    clearInterval(timerInterval);

    // Показываем скример
    screamerImg.style.display = 'block';
    gameOverScreen.style.display = 'flex';

    setTimeout(() => {
        screamerImg.style.display = 'none';
    }, 600);
}

function startGame() {
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    gameOverScreen.style.display = 'none';

    gameActive = true;
    timeLeft = 40;
    player.x = 80;
    enemy.x = 750;

    timerEl.textContent = timeLeft;

    timerInterval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;
        if (timeLeft <= 0) {
            winGame();
        }
    }, 1000);

    gameLoop();
}

function winGame() {
    gameActive = false;
    clearInterval(timerInterval);
    ctx.fillStyle = '#aaffaa';
    ctx.font = 'bold 48px Courier New';
    ctx.fillText('YOU SURVIVED THE NIGHT!', 120, 220);
}

document.getElementById('new-game').addEventListener('click', startGame);
document.getElementById('back-btn').addEventListener('click', () => {
    gameOverScreen.style.display = 'none';
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('menu-screen').style.display = 'block';
    document.getElementById('portrait').src = 'baseroom-normal.jpg';
});
</script>
</body>
</html>
