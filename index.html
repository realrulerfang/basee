<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>5 Nights with Brian</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        background: #000;
        overflow: hidden;
        font-family: 'Courier New', monospace;
        height: 100vh;
        color: #aaffaa;
    }
    .crt {
        position: relative;
        width: 100vw;
        height: 100vh;
        background: #000;
        border: 40px solid #111;
        box-shadow: inset 0 0 200px #000;
        overflow: hidden;
    }
    canvas#noise, .scanlines {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 20;
    }
    .scanlines {
        background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(255,255,255,0.08) 2px, rgba(255,255,255,0.08) 4px);
        animation: scan 4s linear infinite;
    }
    @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

    .portrait {
        position: absolute;
        right: 0; top: 50%;
        transform: translateY(-50%);
        width: 58%; height: 100%;
        object-fit: cover;
        z-index: 1;
        filter: contrast(1.15) brightness(0.85);
        background: #000;
    }

    .content, #game-screen {
        position: relative;
        z-index: 10;
    }
    .title {
        font-size: 4.2rem;
        letter-spacing: 10px;
        text-transform: uppercase;
        text-shadow: 0 0 20px #aaffaa;
        margin-bottom: 40px;
    }
    .menu-item {
        font-size: 2.1rem;
        line-height: 2.6rem;
        padding: 8px 0;
        cursor: pointer;
        transition: 0.2s;
    }
    .menu-item:hover { color: #ff6666; text-shadow: 0 0 15px #ff4444; }

    /* Мини-игра */
    #game-screen {
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100%;
        background: rgba(0,0,0,0.85);
        color: #aaffaa;
    }
    #game-canvas {
        image-rendering: pixelated;
        border: 4px solid #222;
        box-shadow: 0 0 30px #000;
    }
    #game-info {
        margin-top: 15px;
        font-size: 1.6rem;
        text-shadow: 0 0 10px #aaffaa;
    }
    .game-over {
        font-size: 5rem;
        color: #ff4444;
        text-shadow: 0 0 40px #ff0000;
        display: none;
    }
</style>
</head>
<body>
<div class="crt">
    <canvas id="noise"></canvas>
    <img id="portrait" src="baseroom-normal.jpg" class="portrait" alt="">

    <!-- Меню -->
    <div class="content" id="menu-screen">
        <div class="title">5 NIGHTS WITH BRIAN</div>
        <div class="menu">
            <div class="menu-item" id="new-game">>> NEW GAME</div>
            <div class="menu-item" id="continue">>> CONTINUE</div>
        </div>
        <div class="static-text">NIGHT 1</div>
    </div>

    <!-- 8-битная мини-игра -->
    <div id="game-screen">
        <canvas id="game-canvas" width="800" height="400"></canvas>
        <div id="game-info">ВРЕМЯ: <span id="timer">45</span>s</div>
        <div class="game-over" id="game-over">GAME OVER</div>
    </div>

    <div class="scanlines"></div>
</div>

<script>
// CRT Noise
const noiseCanvas = document.getElementById('noise');
const nCtx = noiseCanvas.getContext('2d');
function resizeNoise() {
    noiseCanvas.width = window.innerWidth;
    noiseCanvas.height = window.innerHeight;
}
resizeNoise();
window.addEventListener('resize', resizeNoise);

function drawNoise() {
    const data = nCtx.createImageData(noiseCanvas.width, noiseCanvas.height);
    const buf = data.data;
    for (let i = 0; i < buf.length; i += 4) {
        const val = Math.random() * 255;
        buf[i] = buf[i+1] = buf[i+2] = val;
        buf[i+3] = 70;
    }
    nCtx.putImageData(data, 0, 0);
    requestAnimationFrame(drawNoise);
}
drawNoise();

// === 8-БИТ МИНИ-ИГРА ===
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const timerEl = document.getElementById('timer');
const gameOverEl = document.getElementById('game-over');

let gameActive = false;
let timeLeft = 45;
let timerInterval;

// Игрок
let player = { x: 100, y: 250, width: 40, height: 60, vy: 0, jumping: false };

// Враг
let enemy = { x: 700, y: 250, width: 45, height: 65, speed: 3.5 };

let keys = {};
let score = 0;

// Управление
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.code] = false; });

function startGame() {
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    
    gameActive = true;
    timeLeft = 45;
    player.x = 100;
    enemy.x = 700;
    score = 0;
    gameOverEl.style.display = 'none';

    timerEl.textContent = timeLeft;

    timerInterval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;
        if (timeLeft <= 0) winGame();
    }, 1000);

    gameLoop();
}

function gameLoop() {
    if (!gameActive) return;

    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Пол
    ctx.fillStyle = '#222';
    ctx.fillRect(0, 310, canvas.width, 90);

    // Игрок
    if (keys['ArrowLeft'] || keys['KeyA']) player.x -= 6;
    if (keys['ArrowRight'] || keys['KeyD']) player.x += 6;

    // Прыжок
    if ((keys['Space'] || keys['ArrowUp']) && !player.jumping) {
        player.vy = -16;
        player.jumping = true;
    }

    player.vy += 0.8; // гравитация
    player.y += player.vy;

    if (player.y >= 250) {
        player.y = 250;
        player.vy = 0;
        player.jumping = false;
    }

    // Ограничения
    if (player.x < 0) player.x = 0;
    if (player.x > 400) player.x = 400;

    // Рисуем игрока (8-bit стиль)
    ctx.fillStyle = '#44ff88';
    ctx.fillRect(player.x, player.y, player.width, player.height); // тело
    ctx.fillStyle = '#ffdd88';
    ctx.fillRect(player.x + 8, player.y + 10, 24, 20); // голова

    // Враг (Creepy)
    enemy.x -= enemy.speed + (score * 0.008); // ускоряется
    if (enemy.x < -50) enemy.x = 850;

    ctx.fillStyle = '#aa0000';
    ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(enemy.x + 10, enemy.y + 15, 25, 18); // глаза

    // Коллизия
    if (
        player.x < enemy.x + enemy.width &&
        player.x + player.width > enemy.x &&
        player.y < enemy.y + enemy.height &&
        player.y + player.height > enemy.y
    ) {
        gameOver();
        return;
    }

    score++;
    requestAnimationFrame(gameLoop);
}

function gameOver() {
    gameActive = false;
    clearInterval(timerInterval);
    gameOverEl.style.display = 'block';
    document.getElementById('portrait').src = 'baseroom-creepy.jpg';
}

function winGame() {
    gameActive = false;
    clearInterval(timerInterval);
    ctx.fillStyle = '#aaffaa';
    ctx.font = 'bold 50px Courier New';
    ctx.fillText('YOU SURVIVED!', 180, 200);
}

// Запуск
document.getElementById('new-game').addEventListener('click', startGame);
</script>
</body>
</html>
